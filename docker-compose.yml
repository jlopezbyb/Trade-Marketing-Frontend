version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trade-marketing-app
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: trade-marketing-nginx
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
